#
# Nginx snippet for serving the AICP SOP console under /sop/.
# Drop this into /etc/nginx/conf.d/sop.conf (or include from your existing
# server block) and reload Nginx with: nginx -t && systemctl reload nginx
#
# This snippet expects the Node backend listening on 127.0.0.1:3000 (see
# server/aicp-sop.service). The trailing slashes on the proxy_pass and
# location are important: they strip /sop/ before forwarding.
#

# Increase max upload size for .mp3 audio (default Nginx limit is 1MB).
client_max_body_size 60m;

server {
    listen 80;
    server_name _;

    # Long-poll friendly timeouts so audio uploads don't get cut off.
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 30s;

    location /sop/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
